name: Supabase Migrations (Infinity Finances)

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/scripts/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:

jobs:
  migrate:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID:  ${{ secrets.SUPABASE_PROJECT_ID }}
      RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Infinity Finances project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push schema + migrations
        run: supabase db push

      # Per-user feature flag seed runs after migrations against the
      # freshly-migrated schema. It uses psql variable substitution
      # (\set + :'var'), so we run it with psql rather than the supabase
      # CLI. DATABASE_URL should be the Supabase session-pooler connection
      # string so GitHub Actions can connect over IPv4.
      #
      # `seed-feature-flag-global.sql` is intentionally NOT run here —
      # flipping the global toggle is a deliberate manual action, not
      # something that should happen on every deploy. Run it by hand from
      # the Supabase SQL editor (or via psql) when you want to roll out.
      - name: Seed per-user feature flags
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/scripts/seed-feature-flag-user.sql
