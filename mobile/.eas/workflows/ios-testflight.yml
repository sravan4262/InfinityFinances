name: iOS TestFlight

on:
  workflow_dispatch: {}

jobs:
  validate:
    name: Validate mobile
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Typecheck
        run: npm run typecheck
      - name: Check web/mobile engine parity
        run: npm run test:parity

  build_ios:
    name: Build iOS
    type: build
    needs: [validate]
    environment: production
    params:
      platform: ios
      profile: production

  submit_testflight:
    name: Submit to TestFlight
    type: submit
    needs: [build_ios]
    environment: production
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
